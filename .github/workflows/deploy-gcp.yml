name: Deploy to Google Cloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: multiagentai21
  SERVICE_NAME: multiagentai21
  REGION: us-central1

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install formatting tools
      run: |
        python -m pip install --upgrade pip
        pip install black==23.12.1 isort==5.13.2 flake8==7.0.0
    
    - name: Format with black
      run: |
        black . --line-length 127 --extend-exclude "/(\.git|\.venv|venv|env)/"
    
    - name: Sort imports with isort
      run: |
        isort . --profile black --line-length 127
    
    - name: Commit formatting changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .
        git diff --staged --quiet || (git commit -m "style: format code with black and isort" && git push)
    
    - name: Create Pull Request
      if: github.event_name == 'push'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "style: format code with black and isort"
        title: "style: format code with black and isort"
        body: |
          This PR contains automated formatting changes:
          - Formatted code with black
          - Sorted imports with isort
          - Fixed linting issues
        branch: format-code
        base: main

  lint:
    needs: format
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8==7.0.0
    
    - name: Run flake8 with relaxed rules
      run: |
        flake8 . --count \
          --max-complexity=20 \
          --max-line-length=127 \
          --statistics \
          --ignore=E203,W503,E501,E302,E305,F401,F841,W291,W292,W293,F541,F811,E722,E402,E128,C901 \
          --exclude=.git,__pycache__,build,dist,*.pyc,*.pyo,*.pyd,.Python,env,venv,.venv,.env,.eggs,*.egg-info,.installed.cfg,*.egg,.tox,.coverage,htmlcov,.pytest_cache,.mypy_cache

  deploy:
    needs: [format, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Set up Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}
    
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    
    - name: Configure Docker for GCR
      run: gcloud auth configure-docker
    
    - name: Build Docker image
      run: |
        docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA .
        docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:latest .
    
    - name: Push Docker image to GCR
      run: |
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:latest
    
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy $SERVICE_NAME \
          --image gcr.io/$PROJECT_ID/$SERVICE_NAME:latest \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --memory 2Gi \
          --cpu 2 \
          --concurrency 100 \
          --max-instances 10 \
          --timeout 900 \
          --set-env-vars "ENVIRONMENT=production,GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
    
    - name: Verify domain ownership (optional)
      run: |
        gcloud domains verify multiagentai21.com || echo "Domain verification in progress..."
    
    - name: Deploy custom domain mapping
      run: |
        sleep 30
        gcloud run domain-mappings create \
          --service $SERVICE_NAME \
          --domain multiagentai21.com \
          --region $REGION || echo "Root domain mapping may already exist"
        gcloud run domain-mappings create \
          --service $SERVICE_NAME \
          --domain www.multiagentai21.com \
          --region $REGION || echo "WWW domain mapping may already exist"
    
    - name: Show deployment URLs
      run: |
        echo "Deployment completed!"
        echo "Service URL: $(gcloud run services describe $SERVICE_NAME --region $REGION --format 'value(status.url)')"
        echo "Custom domain: https://multiagentai21.com"
        echo "WWW domain: https://www.multiagentai21.com" 