name: Deploy to Google Cloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: multiagentai21
  SERVICE_NAME: multiagentai21
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Auto-format code with Black
      run: |
        black . --line-length 127 --extend-exclude "/(\.git|\.venv|venv|env)/"
      continue-on-error: true
    
    - name: Sort imports with isort  
      run: |
        isort . --profile black --line-length 127
      continue-on-error: true
    
    - name: Lint with flake8 (relaxed rules)
      run: |
        flake8 . --count --max-complexity=20 --max-line-length=127 --statistics --ignore=E203,W503,E501,E302,E305,F401,F841,W291,W292,W293,F541,F811,E722,E402,E128,C901
      continue-on-error: true
    
    - name: Commit formatting changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git diff --staged --quiet || git commit -m "Auto-format code with Black and isort"
        git push || echo "No changes to commit"
    
    - name: Set up Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}
    
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    
    - name: Configure Docker for GCR
      run: gcloud auth configure-docker
    
    - name: Build Docker image
      run: |
        docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA .
        docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:latest .
    
    - name: Push Docker image to GCR
      run: |
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:latest
    
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy $SERVICE_NAME \
          --image gcr.io/$PROJECT_ID/$SERVICE_NAME:latest \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --memory 2Gi \
          --cpu 2 \
          --concurrency 100 \
          --max-instances 10 \
          --timeout 900 \
          --set-env-vars "ENVIRONMENT=production"
    
    - name: Verify domain ownership (optional)
      run: |
        # This step might fail on first run - domain verification takes time
        gcloud domains verify multiagentai21.com || echo "Domain verification in progress..."
    
    - name: Deploy custom domain mapping
      run: |
        # Wait a moment for service to be ready
        sleep 30
        
        # Create domain mapping for root domain
        gcloud run domain-mappings create \
          --service $SERVICE_NAME \
          --domain multiagentai21.com \
          --region $REGION || echo "Root domain mapping may already exist"
        
        # Create domain mapping for www subdomain  
        gcloud run domain-mappings create \
          --service $SERVICE_NAME \
          --domain www.multiagentai21.com \
          --region $REGION || echo "WWW domain mapping may already exist"
    
    - name: Show deployment URLs
      run: |
        echo "Deployment completed!"
        echo "Service URL: $(gcloud run services describe $SERVICE_NAME --region $REGION --format 'value(status.url)')"
        echo "Custom domain: https://multiagentai21.com"
        echo "WWW domain: https://www.multiagentai21.com" 